<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password reset</title>
    <link rel="stylesheet" href="forgotpassword.css">
</head>
<body>
    <form id="forgot">
        <h1 id="forgotp">Forgot your password ?</h1>
        <h5 id="instruction">Enter your email address to retrieve your password</h5>

        <label>Email</label>
        <input type="email" placeholder="Email" required />

        <button>RESET PASSWORD</button>
    </form>
    
</body>
</html>
