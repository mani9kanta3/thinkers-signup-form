<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thinkers - Login page </title>
    <link rel="stylesheet" href="loginpage.css">
</head>
<body>
    <form id="login">
        <h3>Log into Thinkers</h3>
        <input type="text" placeholder="Mobile number or email" required />
        <input type="password" placeholder="Password" required />
        <button id="log">Log in</button>
        <button  type="button" id="forgot" onclick="location.href='forgotpassword.html'">Forgot password?</button>
        <button type="button" onclick="location.href='signupform.html'" id="create">Create new account</button>
    </form>
</body>
</html>
